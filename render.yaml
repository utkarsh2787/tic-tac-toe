services:
  - type: web
    name: tic-tac-nakama
    runtime: docker
    dockerfilePath: ./server/Dockerfile.render
    dockerContext: ./server
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tic-tac-db
          property: connectionString

databases:
  - name: tic-tac-db
    plan: free
    region: singapore
